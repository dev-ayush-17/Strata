<!-- Footer (Excluded per instruction for linear flows, but keeping a simplified minimal version to anchor the page bottom if needed, otherwise rely on canvas) -->
<script>
        // Simple micro-interaction for ETH input calculation
        const priceInput = document.getElementById('price');
        const usdConversion = 3100; // Mock conversion rate
        const usdLabel = priceInput.parentElement.nextElementSibling;
        const potentialEarningsEl = document.querySelector('.glass-panel .text-primary.font-bold');
        const listingPriceEl = document.querySelector('.glass-panel .justify-between:first-child .text-on-surface');

        priceInput.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (!isNaN(val) && val > 0) {
                const usdValue = (val * usdConversion).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                usdLabel.textContent = `~ ${usdValue}`;
                
                listingPriceEl.textContent = `${val.toFixed(4)} ETH`;
                
                // Calculate fees (2.5% + 5.0% = 7.5%)
                const earnings = val * (1 - 0.075);
                potentialEarningsEl.textContent = `${earnings.toFixed(4)} ETH`;
            } else {
                usdLabel.textContent = `~ $0.00 USD`;
                listingPriceEl.textContent = `-- ETH`;
                potentialEarningsEl.textContent = `-- ETH`;
            }
        });
    </script>
